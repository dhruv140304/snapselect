<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapSelect AI — Your Wedding Photos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="grain"></div>

<nav>
  <div class="logo">SnapSelect <span>AI</span></div>
  <div class="nav-right">
    <span id="event-name-nav"></span>
  </div>
</nav>

<!-- LOADING STATE -->
<div id="loading-screen" class="screen active">
  <div class="loading-inner">
    <div class="loader-ring"></div>
    <p class="loading-text">Loading your photos...</p>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="screen">

  <header class="results-header">
    <div class="header-inner">
      <p class="results-label">AI Curated Gallery</p>
      <h1 id="event-title">Your Wedding Photos</h1>
      <p id="photo-count" class="photo-count"></p>
    </div>
  </header>

  <div class="actions-bar">
    <button class="btn-gold" id="download-zip-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download All as ZIP
    </button>
    <button class="btn-outline" id="copy-link-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Copy Guest Link
    </button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All Photos</button>
    <div id="event-filters"></div>
  </div>

  <div id="photo-grid" class="photo-grid"></div>

</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- ZIP PROGRESS -->
<div id="zip-modal" class="modal hidden">
  <div class="modal-box">
    <h3>Preparing your ZIP</h3>
    <div class="progress-bar"><div id="zip-progress" class="progress-fill"></div></div>
    <p id="zip-status">Starting...</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
